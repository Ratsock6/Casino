name: Discord commits notifier

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send push info to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMITS=$(jq -r '
            .commits[] |
            "- `" + (.id[0:7]) + "` " + .message + " — **" + .author.name + "**"
          ' "$GITHUB_EVENT_PATH")

          CONTENT=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg pusher "${{ github.actor }}" \
            --arg compare "${{ github.event.compare }}" \
            --arg commits "$COMMITS" \
            '{
              username: "GitHub",
              content:
                "📦 **Repo :** \($repo)\n" +
                "🌿 **Branche :** \($branch)\n" +
                "👤 **Push par :** \($pusher)\n\n" +
                "📝 **Commits :**\n" + $commits + "\n\n" +
                "🔗 \($compare)"
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$CONTENT" \
               "$DISCORD_WEBHOOK"