name: Discord commits notifier

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send push info to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMITS=$(jq -r '
            if (.commits | length) > 0 then
              .commits[]
              | "- `" + (.id[0:7]) + "` " + (.message | split("\n")[0]) + " — **" + .author.name + "**"
            else
              "Aucun détail de commit disponible."
            end
          ' "$GITHUB_EVENT_PATH")

          MESSAGE=$(cat <<EOF
📦 **Repo :** ${{ github.repository }}
🌿 **Branche :** ${{ github.ref_name }}
👤 **Push par :** ${{ github.actor }}

📝 **Commits :**
$COMMITS

🔗 ${{ github.event.compare }}
EOF
)

          PAYLOAD=$(jq -n \
            --arg username "GitHub" \
            --arg content "$MESSAGE" \
            '{username: $username, content: $content}')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK"