name: Discord commits notifier

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send push info to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          COMMITS=$(jq -r '
            if (.commits | length) > 0 then
              .commits[]
              | "- `" + (.id[0:7]) + "` " + (.message | split("\n")[0]) + " — **" + .author.name + "**"
            else
              "Aucun détail de commit disponible."
            end
          ' "$GITHUB_EVENT_PATH")

          MESSAGE=$(printf '%s\n' \
            "📦 **Repo :** $REPO" \
            "🌿 **Branche :** $BRANCH" \
            "👤 **Push par :** $ACTOR" \
            "" \
            "📝 **Commits :**" \
            "$COMMITS")

          PAYLOAD=$(jq -n \
            --arg username "GitHub" \
            --arg content "$MESSAGE" \
            '{username: $username, content: $content}')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK"